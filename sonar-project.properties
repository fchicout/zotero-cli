# SonarQube Project Configuration
# This file configures the SonarScanner for the zotero-cli project.

# Unique project key and name in SonarQube
sonar.projectKey=zotero-cli
sonar.projectName=zotero-cli
sonar.projectVersion=2.8.0

# Paths to the source directories
sonar.sources=src
sonar.tests=tests

# Exclusions and Inclusions
# We exclude dependencies, cache folders, and unit tests from source analysis
sonar.exclusions=**/__pycache__/**, **/.venv/**, **/tests/**
sonar.test.inclusions=tests/**/*.py

# Language & Environment settings
sonar.language=py
sonar.python.version=3.10

# Code Coverage Integration
# Specifies the path to the coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Exclude CLI, TUI presentation layers, and legacy core services from coverage calculations
# This focuses SonarQube coverage strictly on our highly-covered domain modules
sonar.coverage.exclusions=src/zotero_cli/cli/**/*.py, src/zotero_cli/cli/tui/**/*.py, src/zotero_cli/core/services/collection_service.py, src/zotero_cli/core/services/sdb/sdb_service.py, src/zotero_cli/core/services/rag_service.py, src/zotero_cli/core/interfaces.py

