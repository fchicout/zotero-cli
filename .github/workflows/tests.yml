name: Run Unit Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Type Check with Mypy
        run: |
          mypy .

      - name: Fetch Secrets from Infisical
        uses: infisical/secrets-action@v1.0.7
        with:
          domain: https://infisical.fchicout.dev
          token: ${{ secrets.INFISICAL_TOKEN }}
          env: dev

      - name: Run Tests
        env:
          ZOTERO_API_KEY: ${{ env.ZOTERO_API_KEY }}
          ZOTERO_LIBRARY_ID: ${{ env.ZOTERO_LIBRARY_ID }}
          ZOTERO_LIBRARY_TYPE: ${{ env.ZOTERO_LIBRARY_TYPE }}
          ZOTERO_USER_ID: ${{ env.ZOTERO_USER_ID }}
          ZOTERO_TARGET_GROUP: ${{ env.ZOTERO_TARGET_GROUP }}
          UNPAYWALL_EMAIL: ${{ env.UNPAYWALL_EMAIL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ env.SEMANTIC_SCHOLAR_API_KEY }}
          HUGGINGFACE_TOKEN: ${{ env.HUGGINGFACE_TOKEN }}
        run: |
          PYTHONPATH=src pytest tests/unit --cov=src/zotero_cli --cov-report=xml

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate Check
        uses: sonarsource/sonarqube-quality-gate-action@v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
